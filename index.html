<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>UYBOP — Maishiy texnika do'koni</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ef5da8">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0d1620;
  --card:#15212e;
  --card2:#1d2c3c;
  --text:#eef3f9;
  --hint:#8ba0b4;
  --accent:#ef5da8;
  --accent-text:#08131f;
  --line:rgba(239,93,168,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px}
.view{display:none}
.view.active{display:block}
.header{padding:14px 16px 6px}
.header h1{font-size:20px}
.header .sub{color:var(--hint);font-size:12px;margin-top:2px}
.search{margin:10px 16px;display:flex;gap:8px}
.search input{flex:1;border:none;border-radius:12px;padding:11px 14px;font-size:15px;background:var(--card);color:var(--text);outline:none}
.brandbar{background:#132A52;padding:14px 16px 14px;border-radius:0 0 20px 20px}
.brandrow{display:flex;align-items:center;gap:10px}
.brandrow .logo{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#08131f;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;flex:0 0 auto}
.brandrow .bname{color:#fff;font-size:16px;font-weight:600;line-height:1.15}
.brandrow .bsub{color:#93a7bb;font-size:11px;margin-top:1px}
.lbtn{padding:6px 12px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#cdd8ea;font-size:12.5px;font-weight:700;cursor:pointer}
.lbtn.on{background:#F7941D;border-color:#F7941D;color:#132A52}
.brandbar .search{margin:12px 0 0}
.brandbar .search input{background:#fff;color:#1a1a1a}
.section-title{font-size:17px;font-weight:700;margin:18px 16px 10px;color:var(--text);letter-spacing:-.2px}
.news{display:flex;gap:10px;overflow-x:auto;padding:2px 16px 6px;scrollbar-width:none}
.news::-webkit-scrollbar{display:none}
.news-card{flex:0 0 150px;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;position:relative;cursor:pointer}
.news-card img{width:100%;height:150px;object-fit:cover;display:block;background:var(--card2)}
.news-card .nbadge{position:absolute;top:8px;left:8px;background:#e24b4a;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.news-card .nname{font-size:12px;padding:8px 10px 2px;height:34px;overflow:hidden;line-height:1.25;color:var(--text)}
.news-card .nprice{font-size:14px;font-weight:700;padding:0 10px 10px;color:var(--accent)}
.news-card .nbadge.disc{background:#e24b4a}
.news-card .nbadge.top{background:#1d9e75}
.oldp{color:var(--hint);text-decoration:line-through;font-weight:400;font-size:11px;margin-right:5px}
.discbadge{position:absolute;top:9px;left:9px;background:#e24b4a;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:9px}
.cats{display:grid;grid-auto-flow:column;grid-template-rows:1fr 1fr;grid-auto-columns:minmax(138px,1fr);gap:10px;overflow-x:auto;padding:6px 16px 12px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cattile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:3px;white-space:nowrap}
.cattile.active{background:var(--accent);border-color:var(--accent)}
.cattile .cnm{font-size:13px;font-weight:500;color:var(--text)}
.cattile .cnt{font-size:11px;color:var(--hint)}
.cattile.active .cnm,.cattile.active .cnt{color:var(--accent-text)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 18px}
.pcard{background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column}
.pimg{position:relative}
/* Portret katakcha (marketplace uslubi) + contain: rasm HECH QACHON qirqilmaydi */
.pimg img{width:100%;aspect-ratio:3/4;object-fit:contain;display:block;background:#fff}
.pimg .noimg{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--card2)}
.qadd{position:absolute;right:9px;bottom:9px;width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:var(--accent-text);font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.qadd:active{transform:scale(.92)}
.pinfo{padding:10px 12px 13px;cursor:pointer}
.pname{font-size:13px;line-height:1.3;height:34px;overflow:hidden;color:var(--text)}
.pprice{margin-top:7px;font-size:15.5px;font-weight:700;color:var(--accent)}
.empty{text-align:center;color:var(--hint);padding:40px 20px;font-size:14px}

/* Kabinet / Balans / Tarix */
.panel{margin:12px 16px;background:var(--card);border-radius:14px;padding:16px}
.panel h3{font-size:15px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(128,128,128,.12);font-size:14px}
.row:last-child{border-bottom:none}
.row .k{color:var(--hint)}
.row .v{font-weight:600;text-align:right}
.balance-big{font-size:34px;font-weight:800;color:var(--accent);text-align:center;padding:18px 0 6px}
.balance-cap{text-align:center;color:var(--hint);font-size:13px;padding-bottom:6px}
.hist .ho{background:var(--card);border-radius:14px;margin:10px 16px;padding:12px 14px}
.hist .ho .hd{display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-bottom:6px}
.hist .ho .hi{font-size:12.5px;color:var(--hint);line-height:1.5}
.note{color:var(--hint);font-size:12px;margin:10px 16px;line-height:1.5}

/* cart list */
.cartlist{padding:0 16px}
.cartlist .ci{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(128,128,128,.12)}
.cartlist .ci img{width:54px;height:54px;border-radius:10px;object-fit:cover;background:var(--card2)}
.cartlist .ci .nm{flex:1;font-size:13px;line-height:1.25}
.cartlist .ci .ctr{display:flex;align-items:center;gap:8px}
.cartlist .ci .ctr button{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);font-size:16px;cursor:pointer;color:var(--text)}
.cartbox{margin:12px 16px;background:var(--card);border-radius:14px;padding:14px 16px}
.total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin:8px 0}
.discount{display:flex;justify-content:space-between;font-size:14px;color:#34c759;margin:4px 0}
.bigbtn{width:100%;border:none;border-radius:12px;padding:14px;background:var(--accent);color:var(--accent-text);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(58px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--card);box-shadow:0 -1px 8px rgba(0,0,0,.06);display:flex;z-index:40}
.nav button{flex:1;border:none;background:none;color:var(--hint);font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;position:relative}
.nav button .ic{font-size:20px}
.nav button.active{color:var(--accent)}
.nav .badge{position:absolute;top:4px;right:50%;transform:translateX(18px);background:#ff3b30;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:50}
.modal.show{display:flex}
.sheet{background:var(--bg);width:100%;max-height:88vh;border-radius:18px 18px 0 0;overflow-y:auto;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.sheet img.big{width:100%;aspect-ratio:3/4;max-height:64vh;object-fit:contain;background:#fff}
.sheet .gal{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;background:#fff;scrollbar-width:none}
.sheet .gal::-webkit-scrollbar{display:none}
.sheet .gal img{flex:0 0 100%;width:100%;aspect-ratio:3/4;max-height:64vh;object-fit:contain;background:#fff;scroll-snap-align:center}
.sheet .vidwrap{margin:0 0 14px;border-radius:12px;overflow:hidden;background:var(--card2)}
.sheet .vidwrap video{width:100%;max-height:40vh;display:block}
.gdots{display:flex;gap:6px;justify-content:center;padding:8px 0 0}
.gdots span{width:7px;height:7px;border-radius:50%;background:var(--hint);opacity:.4}
.gdots span.on{background:var(--accent);opacity:1}
.sheet .body{padding:14px 16px}
.sheet h2{font-size:17px;line-height:1.3}
.sheet .shbtn{flex:0 0 40px;width:40px;height:40px;border:none;border-radius:12px;background:var(--card2);color:var(--text);font-size:18px;cursor:pointer}
.sheet .pinf{font-size:13.5px;line-height:1.55;background:var(--card2);border-radius:12px;padding:10px 12px;margin-bottom:14px}
.sheet .price{font-size:20px;font-weight:800;color:var(--accent);margin:8px 0 2px}
.sheet .meta{color:var(--hint);font-size:13px;margin-bottom:14px}
.qtyrow{display:flex;align-items:center;gap:14px;margin:10px 0 16px}
.qtyrow button{width:44px;height:44px;border-radius:12px;border:none;background:var(--card);font-size:22px;cursor:pointer;color:var(--text)}
.qtyrow .qv{font-size:18px;font-weight:700;width:72px;height:44px;text-align:center;border:1px solid var(--hint);border-radius:12px;background:var(--card);color:var(--text);outline:none}
.ctr input.cq{width:52px;height:32px;text-align:center;font-size:15px;font-weight:700;border:1px solid var(--hint);border-radius:8px;background:var(--bg);color:var(--text);outline:none}
.qv::-webkit-outer-spin-button,.qv::-webkit-inner-spin-button,.cq::-webkit-outer-spin-button,.cq::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qv,.cq{-moz-appearance:textfield}
.vchip{padding:9px 14px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);color:var(--text);font-size:13.5px;font-weight:600;cursor:pointer}
.vchip.sel{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.sheet .addbtn{width:100%;border:none;border-radius:12px;padding:14px;background:var(--accent);color:var(--accent-text);font-size:16px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.92);color:#fff;padding:10px 18px;border-radius:12px;font-size:14px;z-index:99;display:none}
.spin{text-align:center;color:var(--hint);padding:40px;font-size:14px}
</style>
</head>
<body>

<!-- DO'KON -->
<div class="view active" id="v-shop">
  <div class="brandbar">
    <div class="brandrow">
      
      <div><div class="bname" id="shopName" style="font-size:22px;font-weight:800;letter-spacing:.5px">UY<span style="color:#F7941D">BOP</span></div><div class="bsub">Maishiy texnika · Qo'qon</div></div><div style="margin-left:auto;display:flex;gap:6px"><button class="lbtn" id="lb-uz" onclick="setLang('uz')">UZ</button><button class="lbtn" id="lb-ru" onclick="setLang('ru')">RU</button></div>
    </div>
    <div class="search"><input id="q" type="search" placeholder="Mahsulot yoki artikul..."></div>
  </div>
  <div class="sub" id="updated" style="padding:6px 16px 0;color:var(--hint);font-size:11px"></div>
  <div id="shelves"></div>
  <div class="section-title" id="catTitle">Kategoriyalar</div>
  <div class="cats" id="cats"></div>
  <div class="section-title" id="gridTitle">Barcha mahsulotlar</div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Hech narsa topilmadi 😕</div>
</div>

<!-- SAVAT -->
<div class="view" id="v-cart">
  <div class="header"><h1>🛒 Savat</h1></div>
  <div id="cartBody"></div>
</div>

<!-- TARIX -->
<div class="view" id="v-history">
  <div class="header"><h1>🧾 Xaridlar tarixi</h1></div>
  <div id="histBody"><div class="spin">Yuklanmoqda...</div></div>
</div>

<!-- BALANS -->
<div class="view" id="v-balance">
  <div class="header"><h1>💰 Balans</h1></div>
  <div id="balBody"><div class="spin">Yuklanmoqda...</div></div>
</div>

<!-- KABINET -->
<div class="view" id="v-profile">
  <div class="header"><h1>👤 Mijoz kabineti</h1></div>
  <div id="profBody"><div class="spin">Yuklanmoqda...</div></div>
</div>

<!-- pastki menyu -->
<div class="nav" id="nav">
  <button data-v="shop" class="active"><span class="ic">🛍</span>Do'kon</button>
  <button data-v="cart"><span class="ic">🛒</span>Savat<span class="badge" id="navBadge" style="display:none">0</span></button>
  <button data-v="history"><span class="ic">🧾</span>Tarix</button>
  <button data-v="balance"><span class="ic">💰</span>Balans</button>
  <button data-v="profile"><span class="ic">👤</span>Kabinet</button>
</div>

<div class="modal" id="pmodal"><div class="sheet" id="psheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram ? Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
const INIT = tg ? (tg.initData || '') : '';
// Standalone APK/brauzer: Telegram-tasdiqlangan web-sessiya tokeni
let SESS = (!INIT) ? (localStorage.getItem('uybop_ws') || '') : '';
function hasAuth(){ return !!(INIT || SESS); }
function authHeaders(extra){
  const h = Object.assign({}, extra || {});
  if (INIT) h['X-Init-Data'] = INIT;
  else if (SESS) h['X-Web-Auth'] = SESS;
  return h;
}
function clearSess(){ SESS=''; try{ localStorage.removeItem('uybop_ws'); }catch(e){} }
let _logging = false;
async function webLogin(btn){
  if (_logging) return; _logging = true;
  const orig = btn ? btn.textContent : '';
  try{
    if(!DATA.api_url){ toast('API topilmadi'); return; }
    if(btn) btn.textContent = '⏳ Telegram ochilmoqda...';
    const r = await fetch(DATA.api_url + '/api/web/auth/start', {method:'POST'});
    const d = await r.json();
    if(!d.deeplink){ toast('Xatolik, qayta urining'); if(btn) btn.textContent=orig; return; }
    if (tg && tg.openTelegramLink) tg.openTelegramLink(d.deeplink);
    else window.open(d.deeplink, '_blank');
    if(btn) btn.textContent = '⏳ Botda tasdiqlang...';
    for (let i=0;i<90;i++){
      await new Promise(s=>setTimeout(s,2000));
      try{
        const pr = await fetch(DATA.api_url + '/api/web/auth/poll?nonce=' + encodeURIComponent(d.nonce));
        const pd = await pr.json();
        if(pd.token){ localStorage.setItem('uybop_ws', pd.token); location.reload(); return; }
      }catch(e){}
    }
    toast('Vaqt tugadi, qayta urining'); if(btn) btn.textContent=orig;
  } finally { _logging = false; }
}
const LOGIN_HTML = `<div class="empty">📲 Ilovadan to'liq foydalanish (buyurtma, tarix, balans) uchun <b>Telegram orqali bir marta kiring</b>.<br><br><button onclick="webLogin(this)" style="background:var(--accent);color:var(--accent-text);border:none;border-radius:12px;padding:13px 24px;font-size:15px;font-weight:700;cursor:pointer">📲 Telegram orqali kirish</button></div>`;

let DATA = {products: [], categories: [], api_url: ''};
let cart = {};
let delivMode = 'pickup', MY_QOQON = null;
let HIDDEN = new Set();
let OVR = {};
let activeCat = '', query = '', curView = 'shop';
const loaded = {history:false, balance:false, profile:false};

let LANG = localStorage.getItem('uybop_lang') || 'uz';
const T = {
  uz: {
    som:"so'm", qidiruv:"Mahsulot yoki artikul...", yangi:"🆕 Yangi kelganlar",
    kategoriyalar:"Kategoriyalar", hammasi:"Hammasi", barcha:"Barcha mahsulotlar",
    natija:"Qidiruv natijasi", topilmadi:"Hech narsa topilmadi 😕", dan:"dan",
    xil:"xil", ta:"ta", savat_h:"🛒 Savat", tarix_h:"🧾 Xaridlar tarixi",
    balans_h:"💰 Balans", kabinet_h:"👤 Mijoz kabineti",
    nav_shop:"Do'kon", nav_cart:"Savat", nav_hist:"Tarix", nav_bal:"Balans", nav_prof:"Kabinet",
    savatga:"🛒 Savatga qo'shish", mavjud:"✅ Sotuvda mavjud", artikul:"Artikul",
    qoshildi:"✅ Savatga qo'shildi",
    bosh:"Savat bo'sh.<br>Do'kondan mahsulot tanlang.", jami:"Jami:",
    yetkazish:"🚚 Yetkazib berish / to'lov:", buyurtma:"✅ Buyurtma berish",
    davom:"🛍 Xaridni davom ettirish",
    d_pickup:"🏪 Olib ketish", d_pickup_i:"To'lov do'konda",
    d_ideal:"🚕 IDEAL taxi", d_ideal_i:"Naqd — pulni taxichiga berasiz",
    d_yandex:"🚖 Yandex taxi", d_yandex_i:"Karta orqali · arzon yo'lkira",
    d_bts:"📦 BTS pochta", d_bts_i:"Karta orqali · viloyatlarga",
    qoqon_note:"📍 Hududingiz Qo'qondan tashqarida — yetkazish BTS pochta, to'lov karta orqali.",
    reg_t:"Buyurtma berish uchun ro'yxatdan o'ting",
    reg_b:"Bu 30 soniya: botda <b>telefon raqamingizni</b> yuborasiz — buyurtmalaringiz shu raqamga bog'lanadi.<br>Savatingiz saqlanib qoladi.",
    reg_btn:"📱 Ro'yxatdan o'tish",
  },
  ru: {
    som:"сум", qidiruv:"Товар или артикул...", yangi:"🆕 Новинки",
    kategoriyalar:"Категории", hammasi:"Все", barcha:"Все товары",
    natija:"Результаты поиска", topilmadi:"Ничего не найдено 😕", dan:"и выше",
    xil:"вида", ta:"шт", savat_h:"🛒 Корзина", tarix_h:"🧾 История покупок",
    balans_h:"💰 Баланс", kabinet_h:"👤 Кабинет",
    nav_shop:"Магазин", nav_cart:"Корзина", nav_hist:"История", nav_bal:"Баланс", nav_prof:"Кабинет",
    savatga:"🛒 В корзину", mavjud:"✅ В наличии", artikul:"Артикул",
    qoshildi:"✅ Добавлено в корзину",
    bosh:"Корзина пуста.<br>Выберите товары в магазине.", jami:"Итого:",
    yetkazish:"🚚 Доставка / оплата:", buyurtma:"✅ Оформить заказ",
    davom:"🛍 Продолжить покупки",
    d_pickup:"🏪 Самовывоз", d_pickup_i:"Оплата в магазине",
    d_ideal:"🚕 IDEAL такси", d_ideal_i:"Наличными — отдаёте таксисту",
    d_yandex:"🚖 Яндекс такси", d_yandex_i:"Картой · дешёвая доставка",
    d_bts:"📦 Почта BTS", d_bts_i:"Картой · в регионы",
    qoqon_note:"📍 Вы за пределами Коканда — доставка почтой BTS, оплата картой.",
    reg_t:"Зарегистрируйтесь, чтобы оформить заказ",
    reg_b:"Это 30 секунд: отправьте боту <b>номер телефона</b> — заказы привяжутся к нему.<br>Корзина сохранится.",
    reg_btn:"📱 Регистрация",
  },
};
const t = k => (T[LANG] && T[LANG][k]) || T.uz[k] || k;
const fmt = n => new Intl.NumberFormat('uz-UZ').format(Math.round(n)) + ' ' + t('som');
function fotoOf(p){
  if(!p) return '';
  return LANG === 'ru' ? (p.photo_ru || p.photo || '') : (p.photo || p.photo_ru || '');
}
/* Serverdagi rasmning YENGIL nusxasi (asl fayl 1-2 MB bo'lishi mumkin).
   Katalogda 400px, kartochkada 900px — sahifa tez ochilsin. */
function kichik(u, w){
  if(!u || u.indexOf('/api/photo/') === -1) return u;
  return u + (u.indexOf('?') === -1 ? '?' : '&') + 'w=' + w;
}
const el = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function toast(m){ const t=el('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none',1600); }

async function apiGet(path){
  if(!hasAuth()) throw new Error('no-auth');
  if(!DATA.api_url) throw new Error('no-api');
  const r = await fetch(DATA.api_url + path, {headers: authHeaders()});
  if(r.status===401){ clearSess(); throw new Error('no-auth'); }
  if(!r.ok) throw new Error('http'+r.status);
  return r.json();
}
const PHONE_NOTE = LOGIN_HTML;

async function load(){
  try{
    const r = await fetch('data/products.json?v=' + Date.now());
    DATA = await r.json();
    el('updated').textContent = 'Yangilangan: ' + (DATA.generated_at || '');
    if(DATA.authed){ await loadAuthedCatalog(); return; }
    await loadHidden();
    await loadOverrides();

// Himoyalangan (optom) ilova: katalog API'dan, faqat tasdiqlangan mijozga
async function loadAuthedCatalog(){
  if(!hasAuth()){ el('shelves').innerHTML=''; el('grid').innerHTML=''; el('empty').style.display='block'; el('empty').innerHTML=LOGIN_HTML; return; }
  try{
    const r = await fetch(DATA.api_url + '/api/catalog', {headers: authHeaders()});
    if(r.status===401){ clearSess(); el('empty').style.display='block'; el('empty').innerHTML=LOGIN_HTML; return; }
    const d = await r.json();
    if(d.linked===false){ gateMsg('📞 Avval botga telefon raqamingizni yuboring.'); return; }
    if(d.approved===false){ gateMsg('⏳ So\'rovingiz ko\'rib chiqilmoqda.<br><br>Admin sizni tasdiqlagach optom narxlar va buyurtma ochiladi. Tez orada bog\'lanamiz.'); return; }
    DATA = {...DATA, products:d.products||[], shelves:d.shelves||[], categories:d.categories||[]};
    renderShop();
  }catch(e){ gateMsg('Katalogni yuklab bo\'lmadi. Birozdan so\'ng qayta urinib ko\'ring.'); }
}
async function loadOverrides(){
  if(!DATA.api_url) return;
  try{
    const r = await fetch(DATA.api_url + '/api/overrides');
    const d = await r.json();
    OVR = d.map || {};
  }catch(e){ OVR = {}; }
}
function applyOverrides(){
  if(!Object.keys(OVR).length) return;
  const ap = p => {
    const o = OVR[p.id];
    if(!o) return;
    if(o.name) p.name = o.name;
    if(o.price) p.price = o.price;
    if(o.photo) p.photo = DATA.api_url + o.photo;
    if(o.photo_ru) p.photo_ru = DATA.api_url + o.photo_ru;
    if(o.info_uz) p.info_uz = o.info_uz;
    if(o.info_ru) p.info_ru = o.info_ru;
    if(o.gallery) p.gallery = o.gallery.map(u=>DATA.api_url+u);
    if(o.video) p.video = DATA.api_url + o.video;
    if(o.old_price && o.old_price > p.price){
      p.old_price = o.old_price;
      p.disc = Math.round((o.old_price - p.price) / o.old_price * 100);
    }
  };
  (DATA.products||[]).forEach(p=>{
    ap(p);
    if(p.variants){
      p.variants.forEach(v=>{
        const o = OVR[v.id];
        if(o){
          if(o.name) v.label = o.name;
          if(o.price) v.price = o.price;
          if(o.photo) v.photo = DATA.api_url + o.photo;
          if(o.photo_ru) v.photo_ru = DATA.api_url + o.photo_ru;
          if(o.info_uz && !p.info_uz) p.info_uz = o.info_uz;
          if(o.info_ru && !p.info_ru) p.info_ru = o.info_ru;
          if(o.gallery && !p.gallery) p.gallery = o.gallery.map(u=>DATA.api_url+u);
          if(o.video && !p.video) p.video = DATA.api_url + o.video;
        }
      });
      p.price = Math.min.apply(null, p.variants.map(v=>v.price));
    }
  });
  (DATA.shelves||[]).forEach(sh=>(sh.items||[]).forEach(ap));
}
async function loadHidden(){
  if(!DATA.api_url) return;
  try{
    const r = await fetch(DATA.api_url + '/api/hidden');
    const d = await r.json();
    HIDDEN = new Set(d.ids || []);
  }catch(e){ HIDDEN = new Set(); }
}
function applyHidden(){
  if(!HIDDEN.size) return;
  DATA.products = (DATA.products||[]).filter(p=>{
    if(HIDDEN.has(p.id)) return false;
    if(p.variants){
      p.variants = p.variants.filter(v=>!HIDDEN.has(v.id));
      if(!p.variants.length) return false;
      p.price = p.variants[0].price;
    }
    return true;
  });
  (DATA.shelves||[]).forEach(sh=>{ sh.items = (sh.items||[]).filter(it=>!HIDDEN.has(it.id)); });
}
async function loadManual(){
  if(!DATA.api_url) return;
  try{
    const r = await fetch(DATA.api_url + '/api/manual');
    const d = await r.json();
    if(d.products && d.products.length){
      DATA.products = (DATA.products||[]).concat(d.products.filter(p=>!HIDDEN.has(p.id)));
      applyOverrides();
      renderCats(); renderGrid();
    }
  }catch(e){}
}

function OPTOM_PCT(){ return DATA.optom_pct||0; }
function OPTOM_MIN(){ return DATA.optom_min||0; }
function optom(t){ const pct=OPTOM_PCT(), min=OPTOM_MIN(); if(pct>0&&min>0&&t>=min){const d=Math.round(t*pct/100);return{is:true,d,pay:t-d};} return{is:false,d:0,pay:t}; }
function cartCount(){ return Object.values(cart).reduce((a,c)=>a+c.qty,0); }
function cartTotal(){ return Object.values(cart).reduce((a,c)=>a+c.qty*c.price,0); }

    {id:'bts',    nom:t('d_bts'),    izoh:t('d_bts_i'),    qoqon:false},
  ];
}
function delivOptsHtml(){
  const list = delivList().filter(d => MY_QOQON===false ? !d.qoqon : true);

function setDeliv(id){ delivMode=id; const dd=el('dopts'); if(dd) dd.innerHTML=delivOptsHtml(); }

  if(MY_QOQON!==null || !hasAuth() || !DATA.api_url) return;

function cAdj(id,d){
  if(!cart[id]) return;
  let q=Math.min(999,cart[id].qty+d);
  if(q<=0) delete cart[id]; else cart[id].qty=q;
  updateBadge(); renderCart();
}
function cSet(id,v){
  if(!cart[id]) return;
  let q=parseInt(v); if(isNaN(q)||q<1) q=1; if(q>999) q=999;
  cart[id].qty=q; updateBadge(); renderCart();
}
let ordering = false;
async function checkout(){
  if(ordering) return;
  const items = Object.values(cart).map(c=>({id:c.id,name:c.name,price:c.price,qty:c.qty}));
  if(!items.length) return;
  // Backend API orqali (Menu/inline'dan ham ishlaydi). initData yo'q bo'lsa sendData zaxira.
  if(hasAuth() && DATA.api_url){
    ordering = true;
    try{
      const r = await fetch(DATA.api_url + '/api/order', {
        method:'POST',
        headers: authHeaders({'Content-Type':'application/json'}),
        body: JSON.stringify({items, delivery: delivMode})
      });
      if(r.status===401){ clearSess(); toast('Avval Telegram orqali kiring.'); switchView('profile'); return; }
      const d = await r.json();
      if(d.ok){
        cart = {}; updateBadge();
        showOrderDone(d.text || "✅ Buyurtmangiz qabul qilindi!");
      } else if(d.reg){
        showRegPanel();
      } else {
        toast(d.text || "Xatolik. Qayta urinib ko'ring.");
      }
    }catch(e){ toast("Tармoq xatosi. Qayta urinib ko'ring."); }
    finally{ ordering = false; }
  } else if(tg && tg.sendData){
    tg.sendData(JSON.stringify({v:1, items, delivery: delivMode}));
  } else {
    toast('Buyurtma uchun avval Telegram orqali kiring.');
    switchView('profile');
  }
}

}
function showOrderDone(text){
  el('cartBody').innerHTML = `<div class="panel" style="text-align:center"><div style="font-size:40px">✅</div><div style="white-space:pre-wrap;font-size:14px;line-height:1.5;margin-top:8px">${text.replace(/<[^>]+>/g,'')}</div></div><button class="bigbtn" style="margin:0 16px" onclick="switchView('shop')">${t('davom')}</button>`;
}

/* ---------- TARIX / BALANS / KABINET ---------- */
async function loadHistory(){
  try{
    const d = await apiGet('/api/history');
    if(d.linked===false){ el('histBody').innerHTML='<div class="empty">Avval botga telefon raqamingizni yuboring.</div>'; return; }
    if(!d.orders || !d.orders.length){ el('histBody').innerHTML='<div class="empty">Hozircha xaridlar yo\'q. 🛍</div>'; return; }
    el('histBody').innerHTML = d.orders.map(o=>`
      <div class="ho">
        <div class="hd"><span>📅 ${esc(o.date)}</span><span>${esc(o.total_text)}</span></div>
        <div class="hi">${o.items.map(i=>'• '+esc(i.name)+(i.qty?(' × '+i.qty):'')).join('<br>')}</div>
      </div>`).join('');
  }catch(e){ el('histBody').innerHTML = (e.message==='no-auth') ? PHONE_NOTE : '<div class="empty">Tarixni yuklab bo\'lmadi. Birozdan so\'ng qayta oching.</div>'; }
}
async function loadBalance(){
  try{
    const d = await apiGet('/api/balance');
    if(d.linked===false){ el('balBody').innerHTML='<div class="empty">Avval botga telefon raqamingizni yuboring.</div>'; return; }
    el('balBody').innerHTML = `
      <div class="panel">
        <div class="balance-big">${esc(d.balance_text)}</div>
        <div class="balance-cap">Sizning joriy balansingiz (keshbek / bonus)</div>
      </div>
      <div class="note">Balans do'kondagi xaridlaringizdan to'planadi va keyingi xaridda ishlatilishi mumkin.</div>`;
  }catch(e){ el('balBody').innerHTML = (e.message==='no-auth') ? PHONE_NOTE : '<div class="empty">Balansni yuklab bo\'lmadi.</div>'; }
}
async function loadProfile(){
  try{
    const d = await apiGet('/api/me');
    if(d.linked===false){ el('profBody').innerHTML='<div class="empty">Avval botga telefon raqamingizni yuboring.</div>'; return; }
    const loc = [d.region, d.city].filter(Boolean).join(', ') || '—';
    el('profBody').innerHTML = `
      <div class="panel">
        <div class="row"><span class="k">Ism</span><span class="v">${esc(d.name||'—')}</span></div>
        <div class="row"><span class="k">Telefon</span><span class="v">+${esc(d.phone||'')}</span></div>
        <div class="row"><span class="k">Hudud</span><span class="v">${esc(loc)}</span></div>
      </div>
      <div class="note">ℹ️ Ma'lumotlarni o'zgartirish uchun do'konga murojaat qiling.</div>
      ${OPTOM_PCT()>0?`<div class="panel"><div class="row"><span class="k">🏷 Optom</span><span class="v">${fmt(OPTOM_MIN())} dan ${OPTOM_PCT()}% chegirma</span></div></div>`:''}`;
  }catch(e){ el('profBody').innerHTML = (e.message==='no-auth') ? PHONE_NOTE : '<div class="empty">Ma\'lumotni yuklab bo\'lmadi.</div>'; }
}

/* ---------- navigatsiya ---------- */
function switchView(v){
  curView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  el('v-'+v).classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==='cart') renderCart();
  if(v==='history'){ if(!loaded.history){loaded.history=true; loadHistory();} }
  if(v==='balance'){ if(!loaded.balance){loaded.balance=true; loadBalance();} }
  if(v==='profile'){ if(!loaded.profile){loaded.profile=true; loadProfile();} }
  bbSync();
}
document.querySelectorAll('#nav button').forEach(b=> b.onclick=()=>switchView(b.dataset.v));
el('q').addEventListener('input', e=>{
  query=e.target.value.trim();
  const sr=!!query;
  el('shelves').style.display=sr?'none':'';
  el('cats').style.display=sr?'none':'';
  el('catTitle').style.display=sr?'none':'';
  el('gridTitle').textContent=sr?t('natija'):t('barcha');
  renderGrid();
});
el('pmodal').addEventListener('click', e=>{ if(e.target.id==='pmodal') closeSheet(); });

function setLang(l){
  LANG = l;
  try{ localStorage.setItem('uybop_lang', l); }catch(e){}
  applyLang();
  renderShop();
  if(curView==='cart') renderCart();
}
function applyLang(){
  const q0 = el('q'); if(q0) q0.placeholder = t('qidiruv');
  const ct = el('catTitle'); if(ct) ct.textContent = t('kategoriyalar');
  const gt = el('gridTitle'); if(gt) gt.textContent = query ? t('natija') : t('barcha');
  const em = el('empty'); if(em && em.style.display==='none') em.innerHTML = t('topilmadi');
  const h = (sel, k) => { const e = document.querySelector(sel); if(e) e.textContent = t(k); };
  h('#v-cart h1','savat_h'); h('#v-history h1','tarix_h');
  h('#v-balance h1','balans_h'); h('#v-profile h1','kabinet_h');
  const ikon = {shop:'🛍', cart:'🛒', history:'🧾', balance:'💰', profile:'👤'};
  const lab = {shop:t('nav_shop'), cart:t('nav_cart'), history:t('nav_hist'), balance:t('nav_bal'), profile:t('nav_prof')};
  document.querySelectorAll('#nav button').forEach(b=>{
    const v = b.dataset.v;
    const badge = v==='cart' ? '<span class="badge" id="navBadge" style="display:none">0</span>' : '';
    b.innerHTML = `<span class="ic">${ikon[v]}</span>${lab[v]}${badge}`;
  });
  updateBadge();
  const lu = el('lb-uz'), lr = el('lb-ru');
  if(lu) lu.classList.toggle('on', LANG==='uz');
  if(lr) lr.classList.toggle('on', LANG==='ru');
}
applyLang();
load().then(deepLinkOch);

// PWA: service worker (APK/o'rnatish uchun; Telegram ichida ham zararsiz)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
